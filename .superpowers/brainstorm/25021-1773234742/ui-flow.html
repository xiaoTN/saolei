<h2>双人联机 UI 流程</h2>
<p class="subtitle">从主界面到游戏开始的完整界面流转</p>

<div style="display:flex;flex-direction:column;gap:16px;max-width:700px;margin:0 auto">

  <!-- 步骤1 -->
  <div style="display:flex;gap:12px;align-items:flex-start">
    <div style="background:#7c7cff;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-weight:bold;flex-shrink:0;margin-top:4px">1</div>
    <div style="flex:1">
      <div style="font-weight:bold;color:#aef;margin-bottom:6px">主界面：选择模式</div>
      <div style="background:#1a1a2e;border-radius:8px;padding:12px;display:flex;gap:10px">
        <div style="flex:1;background:#2a2a4c;border:2px solid #7c7cff;border-radius:8px;padding:10px;text-align:center">
          <div style="font-size:22px">👤</div>
          <div style="color:#aef;font-size:12px;margin-top:4px;font-weight:bold">单人游戏</div>
        </div>
        <div style="flex:1;background:#2a2a4c;border:2px solid #555;border-radius:8px;padding:10px;text-align:center">
          <div style="font-size:22px">👥</div>
          <div style="color:#888;font-size:12px;margin-top:4px;font-weight:bold">双人联机</div>
        </div>
      </div>
    </div>
  </div>

  <div style="text-align:center;color:#444;font-size:18px">↓ 点击「双人联机」</div>

  <!-- 步骤2 -->
  <div style="display:flex;gap:12px;align-items:flex-start">
    <div style="background:#7c7cff;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-weight:bold;flex-shrink:0;margin-top:4px">2</div>
    <div style="flex:1">
      <div style="font-weight:bold;color:#aef;margin-bottom:6px">联机大厅：创建或加入</div>
      <div style="background:#1a1a2e;border-radius:8px;padding:12px">
        <div style="display:flex;flex-direction:column;gap:8px">
          <div style="background:#2a2a4c;border:1px solid #7c7cff;border-radius:8px;padding:10px">
            <div style="color:#7c7cff;font-size:11px;margin-bottom:6px">▶ 创建房间</div>
            <div style="color:#888;font-size:11px">系统自动生成4位房间码，棋盘/难度在此配置</div>
            <div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap">
              <span style="background:#5555aa;padding:2px 8px;border-radius:4px;font-size:11px">形状选择</span>
              <span style="background:#5555aa;padding:2px 8px;border-radius:4px;font-size:11px">难度选择</span>
              <span style="background:#7c7cff;padding:2px 10px;border-radius:4px;font-size:11px">创建 →</span>
            </div>
          </div>
          <div style="text-align:center;color:#555;font-size:12px">— 或 —</div>
          <div style="background:#2a2a4c;border:1px solid #555;border-radius:8px;padding:10px">
            <div style="color:#888;font-size:11px;margin-bottom:6px">🔗 加入房间</div>
            <div style="display:flex;gap:6px">
              <div style="flex:1;background:#1a1a2e;border:1px solid #444;border-radius:6px;padding:6px;text-align:center;color:#888;letter-spacing:4px;font-size:13px">A3F7</div>
              <div style="background:#5555aa;border-radius:6px;padding:6px 10px;color:#aef;font-size:12px">加入</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div style="text-align:center;color:#444;font-size:18px">↓ 创建后等待 / 加入后进入</div>

  <!-- 步骤3 -->
  <div style="display:flex;gap:12px;align-items:flex-start">
    <div style="background:#7c7cff;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-weight:bold;flex-shrink:0;margin-top:4px">3</div>
    <div style="flex:1">
      <div style="font-weight:bold;color:#aef;margin-bottom:6px">等待室</div>
      <div style="background:#1a1a2e;border-radius:8px;padding:12px">
        <div style="text-align:center;margin-bottom:10px">
          <div style="color:#888;font-size:11px">房间码</div>
          <div style="font-size:28px;letter-spacing:8px;font-weight:bold;color:#fff;font-family:monospace">A3F7</div>
          <div style="color:#666;font-size:11px;margin-top:2px">把这个码告诉你的朋友</div>
        </div>
        <div style="display:flex;gap:8px">
          <div style="flex:1;background:#2a2a4c;border:2px solid #7c7cff;border-radius:8px;padding:8px;text-align:center">
            <div style="font-size:16px">🟢</div>
            <div style="color:#7c7cff;font-size:11px">你（房主）</div>
          </div>
          <div style="flex:1;background:#2a2a4c;border:2px dashed #444;border-radius:8px;padding:8px;text-align:center">
            <div style="font-size:16px;color:#444">⏳</div>
            <div style="color:#555;font-size:11px">等待对方...</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div style="text-align:center;color:#444;font-size:18px">↓ 对方加入后自动开始</div>

  <!-- 步骤4 -->
  <div style="display:flex;gap:12px;align-items:flex-start">
    <div style="background:#7c7cff;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-weight:bold;flex-shrink:0;margin-top:4px">4</div>
    <div style="flex:1">
      <div style="font-weight:bold;color:#aef;margin-bottom:6px">游戏界面（合作模式）</div>
      <div style="background:#1a1a2e;border-radius:8px;padding:12px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <div style="color:#888;font-size:11px">← 返回</div>
          <div style="display:flex;gap:8px;font-size:11px">
            <span style="background:#2a2a4c;padding:3px 8px;border-radius:4px">🚩 3/20</span>
            <span style="background:#2a2a4c;padding:3px 8px;border-radius:4px">⏱ 42s</span>
            <span style="background:#2a2a4c;padding:3px 8px;border-radius:4px">🟢 对方在线</span>
          </div>
          <div style="color:#888;font-size:11px">🔄</div>
        </div>
        <div style="background:#2a2a4c;border-radius:6px;height:80px;display:flex;align-items:center;justify-content:center;color:#555;font-size:12px">棋盘区域（共享）</div>
        <div style="margin-top:8px;display:flex;gap:6px">
          <div style="background:#2a4c2a;border-radius:6px;padding:4px 8px;font-size:11px;color:#4eff4e">你：已翻 24 格</div>
          <div style="background:#2a2a4c;border-radius:6px;padding:4px 8px;font-size:11px;color:#888">对方：已翻 18 格</div>
        </div>
      </div>
    </div>
  </div>

</div>
