<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多边形扫雷游戏</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>💣 多边形扫雷</h1>

        <div class="settings">
            <div class="setting-item">
                <label>边数:</label>
                <div class="sides-buttons">
                    <button class="side-btn" data-sides="3" onclick="selectSides(3)">3</button>
                    <button class="side-btn selected" data-sides="4" onclick="selectSides(4)">4</button>
                    <button class="side-btn" data-sides="6" onclick="selectSides(6)">6</button>
                    <button class="side-btn" data-sides="8" onclick="selectSides(8)">8+4</button>
                </div>
            </div>
            <div class="setting-item slider-item">
                <label>行数: <span id="rows-val">8</span></label>
                <input type="range" id="rows" value="8" min="3" max="20"
                       oninput="document.getElementById('rows-val').textContent=this.value; previewBoardSize()">
            </div>
            <div class="setting-item slider-item">
                <label>列数: <span id="cols-val">8</span></label>
                <input type="range" id="cols" value="8" min="3" max="20"
                       oninput="document.getElementById('cols-val').textContent=this.value; previewBoardSize()">
            </div>
            <div class="setting-item slider-item">
                <label>雷数: <span id="mines-val">10</span></label>
                <input type="range" id="mines" value="10" min="1" max="60"
                       oninput="document.getElementById('mines-val').textContent=this.value; previewMineCount()">
            </div>
            <button onclick="initGame()">开始游戏</button>
        </div>

        <div class="status-bar">
            <div class="status-item">格子数: <span id="cellCount">64</span></div>
            <div class="status-item">雷占比: <span id="mineRatio">—</span></div>
            <div class="status-item">标记: <span id="flagProgress">0</span> / <span id="totalMinesDisplay">10</span></div>
            <div class="status-item">用时: <span id="timer">0</span>秒</div>
        </div>

        <div class="game-board" id="board"></div>

        <div class="message" id="message"></div>

        <div class="tips">左键点击揭示，右键标记地雷</div>
    </div>

    <!-- 加载顺序：geometry → renderer → game -->
    <script src="geometry.js"></script>
    <script src="renderer.js"></script>
    <script src="game.js"></script>
</body>
</html>
