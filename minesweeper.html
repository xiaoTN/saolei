<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>扫雷游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: #0f0f23;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            max-width: 500px;
            width: 100%;
        }

        h1 {
            color: #fff;
            text-align: center;
            margin-bottom: 20px;
            font-size: 28px;
        }

        .settings {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .setting-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .setting-item label {
            color: #888;
            font-size: 14px;
        }

        .setting-item input {
            width: 60px;
            padding: 8px;
            border: 1px solid #333;
            border-radius: 6px;
            background: #1a1a2e;
            color: #fff;
            text-align: center;
            font-size: 14px;
        }

        .setting-item input:focus {
            outline: none;
            border-color: #4a9eff;
        }

        button {
            padding: 10px 24px;
            background: linear-gradient(135deg, #4a9eff, #0066cc);
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(74, 158, 255, 0.4);
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            padding: 10px 15px;
            background: #1a1a2e;
            border-radius: 8px;
        }

        .status-item {
            color: #888;
            font-size: 14px;
        }

        .status-item span {
            color: #4a9eff;
            font-weight: bold;
        }

        .game-board {
            display: grid;
            gap: 4px;
            background: #333;
            padding: 4px;
            border-radius: 8px;
            margin: 0 auto;
        }

        .cell {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #3a3a5c, #2a2a4c);
            border: none;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
            transition: all 0.15s;
            user-select: none;
        }

        .cell:hover:not(.revealed):not(.flagged) {
            background: linear-gradient(135deg, #4a4a7c, #3a3a6c);
            transform: scale(1.05);
        }

        .cell.revealed {
            background: #1a1a2e;
            cursor: default;
        }

        .cell.mine {
            background: #ff4757;
            animation: pulse 0.5s ease-in-out;
        }

        .cell.flagged {
            color: #ff6b6b;
        }

        .cell[data-number="1"] { color: #4a9eff; }
        .cell[data-number="2"] { color: #2ed573; }
        .cell[data-number="3"] { color: #ff4757; }
        .cell[data-number="4"] { color: #a55eea; }
        .cell[data-number="5"] { color: #ffa502; }
        .cell[data-number="6"] { color: #1dd1a1; }
        .cell[data-number="7"] { color: #ff6b81; }
        .cell[data-number="8"] { color: #70a1ff; }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .message {
            text-align: center;
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            font-weight: bold;
            display: none;
        }

        .message.win {
            display: block;
            background: rgba(46, 213, 115, 0.2);
            color: #2ed573;
        }

        .message.lose {
            display: block;
            background: rgba(255, 71, 87, 0.2);
            color: #ff4757;
        }

        .tips {
            text-align: center;
            color: #666;
            font-size: 12px;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💣 扫雷游戏</h1>

        <div class="settings">
            <div class="setting-item">
                <label>行数:</label>
                <input type="number" id="rows" value="6" min="3" max="20">
            </div>
            <div class="setting-item">
                <label>列数:</label>
                <input type="number" id="cols" value="6" min="3" max="20">
            </div>
            <div class="setting-item">
                <label>雷数:</label>
                <input type="number" id="mines" value="8" min="1">
            </div>
            <button onclick="initGame()">开始游戏</button>
        </div>

        <div class="status-bar">
            <div class="status-item">剩余雷数: <span id="mineCount">8</span></div>
            <div class="status-item">用时: <span id="timer">0</span>秒</div>
        </div>

        <div class="game-board" id="board"></div>

        <div class="message" id="message"></div>

        <div class="tips">左键点击揭示，右键标记地雷</div>
    </div>

    <script>
        let board = [];
        let revealed = [];
        let flagged = [];
        let mineLocations = [];
        let gameOver = false;
        let mineCount = 0;
        let timer = 0;
        let timerInterval = null;
        let rows = 6;
        let cols = 6;

        function initGame() {
            // 获取设置
            rows = parseInt(document.getElementById('rows').value);
            cols = parseInt(document.getElementById('cols').value);
            mineCount = parseInt(document.getElementById('mines').value);

            // 验证雷数
            const maxMines = rows * cols - 9;
            if (mineCount > maxMines) {
                mineCount = maxMines;
                document.getElementById('mines').value = mineCount;
            }
            if (mineCount < 1) mineCount = 1;

            // 重置状态
            board = [];
            revealed = [];
            flagged = [];
            mineLocations = [];
            gameOver = false;
            timer = 0;

            // 清除计时器
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }

            // 更新显示
            document.getElementById('mineCount').textContent = mineCount;
            document.getElementById('timer').textContent = '0';
            document.getElementById('message').className = 'message';
            document.getElementById('message').textContent = '';

            // 创建棋盘
            createBoard();
        }

        function createBoard() {
            const boardEl = document.getElementById('board');
            boardEl.innerHTML = '';
            boardEl.style.gridTemplateColumns = `repeat(${cols}, 40px)`;

            // 初始化数组
            for (let i = 0; i < rows; i++) {
                board[i] = [];
                revealed[i] = [];
                flagged[i] = [];
                for (let j = 0; j < cols; j++) {
                    board[i][j] = 0;
                    revealed[i][j] = false;
                    flagged[i][j] = false;
                }
            }

            // 随机放置地雷
            let minesPlaced = 0;
            while (minesPlaced < mineCount) {
                const r = Math.floor(Math.random() * rows);
                const c = Math.floor(Math.random() * cols);
                if (board[r][c] !== -1) {
                    board[r][c] = -1;
                    mineLocations.push([r, c]);
                    minesPlaced++;
                }
            }

            // 计算每个格子的数字
            for (let i = 0; i < rows; i++) {
                for (let j = 0; j < cols; j++) {
                    if (board[i][j] !== -1) {
                        board[i][j] = countMines(i, j);
                    }
                }
            }

            // 创建DOM元素
            for (let i = 0; i < rows; i++) {
                for (let j = 0; j < cols; j++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.row = i;
                    cell.dataset.col = j;

                    cell.addEventListener('click', () => handleClick(i, j));
                    cell.addEventListener('contextmenu', (e) => handleRightClick(e, i, j));

                    boardEl.appendChild(cell);
                }
            }
        }

        function countMines(row, col) {
            let count = 0;
            for (let i = row - 1; i <= row + 1; i++) {
                for (let j = col - 1; j <= col + 1; j++) {
                    if (i >= 0 && i < rows && j >= 0 && j < cols && board[i][j] === -1) {
                        count++;
                    }
                }
            }
            return count;
        }

        function startTimer() {
            if (!timerInterval) {
                timerInterval = setInterval(() => {
                    timer++;
                    document.getElementById('timer').textContent = timer;
                }, 1000);
            }
        }

        function handleClick(row, col) {
            if (gameOver || revealed[row][col] || flagged[row][col]) return;

            startTimer();

            if (board[row][col] === -1) {
                // 踩到雷了
                revealAllMines();
                gameOver = true;
                clearInterval(timerInterval);
                const messageEl = document.getElementById('message');
                messageEl.textContent = '💥 游戏结束！你踩到雷了';
                messageEl.className = 'message lose';
                return;
            }

            revealCell(row, col);
            checkWin();
        }

        function handleRightClick(e, row, col) {
            e.preventDefault();
            if (gameOver || revealed[row][col]) return;

            startTimer();

            const cell = document.querySelector(`.cell[data-row="${row}"][data-col="${col}"]`);

            if (flagged[row][col]) {
                flagged[row][col] = false;
                cell.classList.remove('flagged');
                cell.textContent = '';
                document.getElementById('mineCount').textContent = ++mineCount;
            } else {
                flagged[row][col] = true;
                cell.classList.add('flagged');
                cell.textContent = '🚩';
                document.getElementById('mineCount').textContent = --mineCount;
            }
        }

        function revealCell(row, col) {
            if (row < 0 || row >= rows || col < 0 || col >= cols) return;
            if (revealed[row][col] || flagged[row][col]) return;

            revealed[row][col] = true;
            const cell = document.querySelector(`.cell[data-row="${row}"][data-col="${col}"]`);
            cell.classList.add('revealed');

            if (board[row][col] > 0) {
                cell.textContent = board[row][col];
                cell.dataset.number = board[row][col];
            } else if (board[row][col] === 0) {
                // 空格子，递归揭示周围格子
                for (let i = row - 1; i <= row + 1; i++) {
                    for (let j = col - 1; j <= col + 1; j++) {
                        revealCell(i, j);
                    }
                }
            }
        }

        function revealAllMines() {
            mineLocations.forEach(([r, c]) => {
                const cell = document.querySelector(`.cell[data-row="${r}"][data-col="${c}"]`);
                cell.classList.add('revealed', 'mine');
                cell.textContent = '💣';
            });
        }

        function checkWin() {
            let revealedCount = 0;
            for (let i = 0; i < rows; i++) {
                for (let j = 0; j < cols; j++) {
                    if (revealed[i][j]) revealedCount++;
                }
            }

            if (revealedCount === rows * cols - mineCount) {
                gameOver = true;
                clearInterval(timerInterval);
                const messageEl = document.getElementById('message');
                messageEl.textContent = `🎉 恭喜！你赢了！用时 ${timer} 秒`;
                messageEl.className = 'message win';

                // 标记所有雷
                mineLocations.forEach(([r, c]) => {
                    if (!flagged[r][c]) {
                        const cell = document.querySelector(`.cell[data-row="${r}"][data-col="${c}"]`);
                        cell.classList.add('flagged');
                        cell.textContent = '🚩';
                    }
                });
            }
        }

        // 初始化游戏
        initGame();
    </script>
</body>
</html>
