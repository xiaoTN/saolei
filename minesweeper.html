<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多边形扫雷游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: #0f0f23;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            max-width: 600px;
            width: 100%;
        }

        h1 {
            color: #fff;
            text-align: center;
            margin-bottom: 20px;
            font-size: 28px;
        }

        .settings {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
        }

        .setting-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .setting-item label {
            color: #888;
            font-size: 14px;
        }

        .setting-item input, .setting-item select {
            width: 70px;
            padding: 8px;
            border: 1px solid #333;
            border-radius: 6px;
            background: #1a1a2e;
            color: #fff;
            text-align: center;
            font-size: 14px;
        }

        .setting-item input:focus, .setting-item select:focus {
            outline: none;
            border-color: #4a9eff;
        }

        button {
            padding: 10px 24px;
            background: linear-gradient(135deg, #4a9eff, #0066cc);
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(74, 158, 255, 0.4);
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            padding: 10px 15px;
            background: #1a1a2e;
            border-radius: 8px;
        }

        .status-item {
            color: #888;
            font-size: 14px;
        }

        .status-item span {
            color: #4a9eff;
            font-weight: bold;
        }

        .game-board {
            position: relative;
            margin: 20px auto;
            width: fit-content;
        }

        .cell {
            position: absolute;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
            transition: all 0.15s;
            user-select: none;
            clip-path: polygon(50% 0%, 100% 38%, 82% 100%, 18% 100%, 0% 38%);
            background: linear-gradient(135deg, #3a3a5c, #2a2a4c);
        }

        .cell:hover:not(.revealed):not(.flagged) {
            background: linear-gradient(135deg, #4a4a7c, #3a3a6c);
            transform: scale(1.1);
            z-index: 10;
        }

        .cell.revealed {
            background: #1a1a2e;
            cursor: default;
        }

        .cell.mine {
            background: #ff4757 !important;
            animation: pulse 0.5s ease-in-out;
        }

        .cell.flagged {
            color: #ff6b6b;
        }

        .cell[data-number="1"] { color: #4a9eff; }
        .cell[data-number="2"] { color: #2ed573; }
        .cell[data-number="3"] { color: #ff4757; }
        .cell[data-number="4"] { color: #a55eea; }
        .cell[data-number="5"] { color: #ffa502; }
        .cell[data-number="6"] { color: #1dd1a1; }
        .cell[data-number="7"] { color: #ff6b81; }
        .cell[data-number="8"] { color: #70a1ff; }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        .message {
            text-align: center;
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            font-weight: bold;
            display: none;
        }

        .message.win {
            display: block;
            background: rgba(46, 213, 115, 0.2);
            color: #2ed573;
        }

        .message.lose {
            display: block;
            background: rgba(255, 71, 87, 0.2);
            color: #ff4757;
        }

        .tips {
            text-align: center;
            color: #666;
            font-size: 12px;
            margin-top: 15px;
        }

        .shape-preview {
            width: 20px;
            height: 20px;
            display: inline-block;
            vertical-align: middle;
            background: linear-gradient(135deg, #4a4a7c, #3a3a6c);
            margin-left: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💣 多边形扫雷</h1>

        <div class="settings">
            <div class="setting-item">
                <label>边数:</label>
                <select id="sides" onchange="updateCellSize()">
                    <option value="3">3边 (三角形)</option>
                    <option value="4" selected>4边 (正方形)</option>
                    <option value="5">5边 (五边形)</option>
                    <option value="6">6边 (六边形)</option>
                    <option value="8">8边 (八边形)</option>
                </select>
            </div>
            <div class="setting-item">
                <label>行数:</label>
                <input type="number" id="rows" value="8" min="3" max="15">
            </div>
            <div class="setting-item">
                <label>列数:</label>
                <input type="number" id="cols" value="8" min="3" max="15">
            </div>
            <div class="setting-item">
                <label>雷数:</label>
                <input type="number" id="mines" value="10" min="1">
            </div>
            <button onclick="initGame()">开始游戏</button>
        </div>

        <div class="status-bar">
            <div class="status-item">剩余雷数: <span id="mineCount">10</span></div>
            <div class="status-item">用时: <span id="timer">0</span>秒</div>
        </div>

        <div class="game-board" id="board"></div>

        <div class="message" id="message"></div>

        <div class="tips">左键点击揭示，右键标记地雷</div>
    </div>

    <script>
        let board = {};
        let revealed = {};
        let flagged = {};
        let mineLocations = [];
        let gameOver = false;
        let mineCount = 0;
        let timer = 0;
        let timerInterval = null;
        let rows = 8;
        let cols = 8;
        let sides = 4;
        let cellSize = 44;
        let cellSpacing = 0;

        function getClipPath(sides) {
            if (sides === 3) {
                return 'polygon(50% 0%, 100% 86.6%, 50% 100%, 0% 86.6%)';
            } else if (sides === 4) {
                return 'polygon(0% 0%, 100% 0%, 100% 100%, 0% 100%)';
            } else if (sides === 5) {
                // 更圆润的五边形
                return 'polygon(50% 0%, 95% 31%, 81% 95%, 19% 95%, 5% 31%)';
            } else if (sides === 6) {
                return 'polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%)';
            } else if (sides === 8) {
                // 更圆润的八边形
                return 'polygon(30% 0%, 70% 0%, 100% 30%, 100% 70%, 70% 100%, 30% 100%, 0% 70%, 0% 30%)';
            }
            return 'polygon(50% 0%, 95% 31%, 81% 95%, 19% 95%, 5% 31%)';
        }

        function getNeighbors(row, col) {
            const neighbors = [];

            if (sides === 3) {
                // 三角形布局 - 紧密贴合
                // 奇偶列方向交替
                if (col % 2 === 0) {
                    // 偶数列：尖朝上，底在下 -> 相邻：左、右、下、左下、右下
                    neighbors.push([row, col - 1]); // 左
                    neighbors.push([row, col + 1]); // 右
                    if (row < rows - 1) {
                        neighbors.push([row + 1, col]); // 下
                        neighbors.push([row + 1, col - 1]); // 左下
                        if (col < cols - 1) neighbors.push([row + 1, col + 1]); // 右下
                    }
                } else {
                    // 奇数列：尖朝下，底在上 -> 相邻：左、右、上、左上、右上
                    neighbors.push([row, col - 1]); // 左
                    neighbors.push([row, col + 1]); // 右
                    if (row > 0) {
                        neighbors.push([row - 1, col]); // 上
                        neighbors.push([row - 1, col - 1]); // 左上
                        if (col < cols - 1) neighbors.push([row - 1, col + 1]); // 右上
                    }
                }
            } else if (sides === 4) {
                // 正方形：8邻域
                for (let dr = -1; dr <= 1; dr++) {
                    for (let dc = -1; dc <= 1; dc++) {
                        if (dr === 0 && dc === 0) continue;
                        const nr = row + dr, nc = col + dc;
                        if (nr >= 0 && nr < rows && nc >= 0 && nc < cols) {
                            neighbors.push([nr, nc]);
                        }
                    }
                }
            } else if (sides === 5) {
                // 五边形布局
                for (let dr = -1; dr <= 1; dr++) {
                    for (let dc = -1; dc <= 1; dc++) {
                        if (dr === 0 && dc === 0) continue;
                        const nr = row + dr, nc = col + dc;
                        if (nr >= 0 && nr < rows && nc >= 0 && nc < cols) {
                            neighbors.push([nr, nc]);
                        }
                    }
                }
            } else if (sides === 6) {
                // 六边形布局 (蜂窝状)
                if (col % 2 === 0) {
                    // 偶数列
                    neighbors.push([row - 1, col - 1], [row - 1, col]);
                    neighbors.push([row, col - 1], [row, col + 1]);
                    neighbors.push([row + 1, col - 1], [row + 1, col]);
                } else {
                    // 奇数列
                    neighbors.push([row - 1, col], [row - 1, col + 1]);
                    neighbors.push([row, col - 1], [row, col + 1]);
                    neighbors.push([row + 1, col], [row + 1, col + 1]);
                }
            } else if (sides === 8) {
                // 八边形：8邻域
                for (let dr = -1; dr <= 1; dr++) {
                    for (let dc = -1; dc <= 1; dc++) {
                        if (dr === 0 && dc === 0) continue;
                        const nr = row + dr, nc = col + dc;
                        if (nr >= 0 && nr < rows && nc >= 0 && nc < cols) {
                            neighbors.push([nr, nc]);
                        }
                    }
                }
            }

            return neighbors.filter(([r, c]) => r >= 0 && r < rows && c >= 0 && c < cols);
        }

        function getCellPosition(row, col) {
            const cellHeight = cellSize * (sides === 3 ? 0.866 : sides === 6 ? 0.866 : sides === 5 ? 0.85 : sides === 8 ? 0.8 : 0.8);
            let x, y;

            if (sides === 3) {
                // 三角形 - 紧密贴合
                // 等边三角形：高度 = 边长 * sqrt(3)/2 ≈ 边长 * 0.866
                const triHeight = cellSize * 0.866;
                x = col * (cellSize * 0.5) + cellSize / 2;
                y = row * (triHeight * 0.5) + cellSize / 2;
                // 奇偶列交替
                if (col % 2 === 1) {
                    y += triHeight * 0.25;
                }
            } else if (sides === 6) {
                // 六边形 - 蜂窝状紧密贴合
                const hexHeight = cellSize * 0.866;
                const hexWidth = cellSize;
                x = col * (hexWidth * 0.75) + cellSize / 2;
                y = row * (hexHeight * 0.75) + cellSize / 2;
                if (col % 2 === 1) {
                    y += hexHeight * 0.5;
                }
            } else if (sides === 5) {
                // 五边形 - 近似圆形紧密排列
                x = col * (cellSize * 0.85) + cellSize / 2;
                y = row * (cellSize * 0.85) + cellSize / 2;
                if (col % 2 === 1) {
                    y += cellSize * 0.35;
                }
            } else if (sides === 8) {
                // 八边形 - 近似圆形紧密排列
                x = col * (cellSize * 0.85) + cellSize / 2;
                y = row * (cellSize * 0.85) + cellSize / 2;
            } else {
                // 四边形 - 紧密方格
                x = col * cellSize + cellSize / 2;
                y = row * cellSize + cellSize / 2;
            }

            return { x, y };
        }

        function updateCellSize() {
            sides = parseInt(document.getElementById('sides').value);
            const sizeMap = { 3: 48, 4: 42, 5: 44, 6: 44, 8: 40 };
            cellSize = sizeMap[sides] || 44;
            cellSpacing = 0;
        }

        function initGame() {
            updateCellSize();

            rows = parseInt(document.getElementById('rows').value);
            cols = parseInt(document.getElementById('cols').value);
            mineCount = parseInt(document.getElementById('mines').value);

            const maxMines = Math.floor(rows * cols * 0.8);
            if (mineCount > maxMines) {
                mineCount = maxMines;
                document.getElementById('mines').value = mineCount;
            }
            if (mineCount < 1) mineCount = 1;

            board = {};
            revealed = {};
            flagged = {};
            mineLocations = [];
            gameOver = false;
            timer = 0;

            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }

            document.getElementById('mineCount').textContent = mineCount;
            document.getElementById('timer').textContent = '0';
            document.getElementById('message').className = 'message';
            document.getElementById('message').textContent = '';

            createBoard();
        }

        function createBoard() {
            const boardEl = document.getElementById('board');
            boardEl.innerHTML = '';

            // 计算画布大小 - 根据不同边数紧密排列
            let width, height;
            if (sides === 3) {
                const triHeight = cellSize * 0.866;
                width = cols * (cellSize * 0.5) + cellSize * 1.5;
                height = rows * (triHeight * 0.5) + triHeight * 1.5;
            } else if (sides === 6) {
                const hexHeight = cellSize * 0.866;
                width = cols * (cellSize * 0.75) + cellSize * 1.5;
                height = rows * (hexHeight * 0.75) + hexHeight * 1.5;
            } else if (sides === 5) {
                width = cols * (cellSize * 0.85) + cellSize * 1.5;
                height = rows * (cellSize * 0.85) + cellSize * 1.5;
            } else if (sides === 8) {
                width = cols * (cellSize * 0.85) + cellSize * 1.5;
                height = rows * (cellSize * 0.85) + cellSize * 1.5;
            } else {
                width = cols * cellSize + cellSize;
                height = rows * cellSize + cellSize;
            }
            boardEl.style.width = width + 'px';
            boardEl.style.height = height + 'px';

            // 初始化格子
            for (let i = 0; i < rows; i++) {
                for (let j = 0; j < cols; j++) {
                    const key = `${i},${j}`;
                    board[key] = 0;
                    revealed[key] = false;
                    flagged[key] = false;
                }
            }

            // 随机放置地雷
            let minesPlaced = 0;
            while (minesPlaced < mineCount) {
                const r = Math.floor(Math.random() * rows);
                const c = Math.floor(Math.random() * cols);
                const key = `${r},${c}`;
                if (board[key] !== -1) {
                    board[key] = -1;
                    mineLocations.push([r, c]);
                    minesPlaced++;
                }
            }

            // 计算每个格子的数字
            for (let i = 0; i < rows; i++) {
                for (let j = 0; j < cols; j++) {
                    const key = `${i},${j}`;
                    if (board[key] !== -1) {
                        board[key] = countMines(i, j);
                    }
                }
            }

            // 创建DOM元素
            for (let i = 0; i < rows; i++) {
                for (let j = 0; j < cols; j++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.style.width = cellSize + 'px';
                    cell.style.height = cellSize + 'px';
                    cell.style.clipPath = getClipPath(sides);
                    cell.dataset.row = i;
                    cell.dataset.col = j;

                    const pos = getCellPosition(i, j);
                    cell.style.left = (pos.x - cellSize / 2) + 'px';
                    cell.style.top = (pos.y - cellSize / 2) + 'px';

                    cell.addEventListener('click', () => handleClick(i, j));
                    cell.addEventListener('contextmenu', (e) => handleRightClick(e, i, j));

                    boardEl.appendChild(cell);
                }
            }
        }

        function countMines(row, col) {
            let count = 0;
            const neighbors = getNeighbors(row, col);
            neighbors.forEach(([r, c]) => {
                if (board[`${r},${c}`] === -1) count++;
            });
            return count;
        }

        function startTimer() {
            if (!timerInterval) {
                timerInterval = setInterval(() => {
                    timer++;
                    document.getElementById('timer').textContent = timer;
                }, 1000);
            }
        }

        function handleClick(row, col) {
            const key = `${row},${col}`;
            if (gameOver || revealed[key] || flagged[key]) return;

            startTimer();

            if (board[key] === -1) {
                revealAllMines();
                gameOver = true;
                clearInterval(timerInterval);
                const messageEl = document.getElementById('message');
                messageEl.textContent = '💥 游戏结束！你踩到雷了';
                messageEl.className = 'message lose';
                return;
            }

            revealCell(row, col);
            checkWin();
        }

        function handleRightClick(e, row, col) {
            e.preventDefault();
            const key = `${row},${col}`;
            if (gameOver || revealed[key]) return;

            startTimer();

            const cell = document.querySelector(`.cell[data-row="${row}"][data-col="${col}"]`);

            if (flagged[key]) {
                flagged[key] = false;
                cell.classList.remove('flagged');
                cell.textContent = '';
                document.getElementById('mineCount').textContent = ++mineCount;
            } else {
                flagged[key] = true;
                cell.classList.add('flagged');
                cell.textContent = '🚩';
                document.getElementById('mineCount').textContent = --mineCount;
            }
        }

        function revealCell(row, col) {
            const key = `${row},${col}`;
            if (revealed[key] || flagged[key]) return;
            if (row < 0 || row >= rows || col < 0 || col >= cols) return;

            revealed[key] = true;
            const cell = document.querySelector(`.cell[data-row="${row}"][data-col="${col}"]`);
            cell.classList.add('revealed');

            if (board[key] > 0) {
                cell.textContent = board[key];
                cell.dataset.number = board[key];
            } else if (board[key] === 0) {
                const neighbors = getNeighbors(row, col);
                neighbors.forEach(([r, c]) => revealCell(r, c));
            }
        }

        function revealAllMines() {
            mineLocations.forEach(([r, c]) => {
                const cell = document.querySelector(`.cell[data-row="${r}"][data-col="${c}"]`);
                cell.classList.add('revealed', 'mine');
                cell.textContent = '💣';
            });
        }

        function checkWin() {
            let revealedCount = 0;
            for (let i = 0; i < rows; i++) {
                for (let j = 0; j < cols; j++) {
                    if (revealed[`${i},${j}`]) revealedCount++;
                }
            }

            if (revealedCount === rows * cols - mineCount) {
                gameOver = true;
                clearInterval(timerInterval);
                const messageEl = document.getElementById('message');
                messageEl.textContent = `🎉 恭喜！你赢了！用时 ${timer} 秒`;
                messageEl.className = 'message win';

                mineLocations.forEach(([r, c]) => {
                    const key = `${r},${c}`;
                    if (!flagged[key]) {
                        const cell = document.querySelector(`.cell[data-row="${r}"][data-col="${c}"]`);
                        cell.classList.add('flagged');
                        cell.textContent = '🚩';
                    }
                });
            }
        }

        initGame();
    </script>
</body>
</html>
