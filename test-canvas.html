        // Mock game functions
        function handleClick(row, col) {
            document.getElementById('status').textContent = `点击: (${row}, ${col})`;
            setCellState(row, col, 'revealed', Math.floor(Math.random() * 8) + 1);
        }
        function handleRightClick(e, row, col) {
            e.preventDefault();
            const key = `${row},${col}`;
            if (flagged[key]) {
                flagged[key] = false;
                setCellState(row, col, 'normal');
            } else {
                flagged[key] = true;
                setCellState(row, col, 'flagged');
            }
            document.getElementById('status').textContent = `标记: (${row}, ${col})`;

        }

    <script src="geometry.js"></script>

    <script>
        // Test
        try {
            const boardEl = document.getElementById('board');
            const { width, height } = getBoardSize(sides);

            console.log('Board size:', width, height);
            createSVGBoard(boardEl, width, height);

            document.getElementById('status').textContent =
                `✅ Canvas 渲染器加载成功！棋盘大小: ${width}x${height}，格子数: ${Object.keys(cellDomMap).length}`;

            // Test different cell types
            setTimeout(() => {
                setCellState(0, 0, 'revealed', 1);
                setCellState(0, 1, 'revealed', 2);
                setCellState(0, 2, 'revealed', 3);
                setCellState(1, 0, 'flagged');
                setCellState(1, 1, 'mine');
                console.log('Test cells updated');
            }, 100);

        } catch (error) {
            document.getElementById('status').textContent = `❌ 错误: ${error.message}`;
            console.error('Error:', error);
        }
